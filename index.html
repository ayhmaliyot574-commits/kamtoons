<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مطعم كامتون</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

.menu button {
  padding: 10px;
  margin: 5px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
}

.invoice {
  display: none;
  background: white;
  color: black;
  width: 300px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 10px;
}

.delete { background: red; color: white; }
.print { background: green; color: white; padding: 10px; margin-top: 10px; }

@media print {
  body * { display: none; }
  .invoice, .invoice * { display: block; }
}
</style>

</head>
<body>

<h2>🍕 المنيو</h2>

<div class="menu">
<button onclick="addItem('مندي',8000)">مندي 8000</button>
<button onclick="addItem('منسف',9000)">منسف 9000</button>
<button onclick="addItem('دولمة',7000)">دولمة 7000</button>
<button onclick="addItem('كباب',6000)">كباب 6000</button>
<button onclick="addItem('بركر',4000)">بركر 4000</button>
<button onclick="addItem('بطاطس',2000)">بطاطس 2000</button>
<button onclick="addItem('بيبسي',1000)">بيبسي 1000</button>
</div>

<br>
<button onclick="goInvoice()">➡️ عرض الفاتورة</button>

<div class="invoice" id="invoice">

<h3>🧾 مطعم كامتون</h3>
<p>📞 07905264140</p>

<p id="date"></p>
<p>رقم الفاتورة: <span id="inv"></span></p>

<ul id="list"></ul>

<h3>المجموع: <span id="total">0</span></h3>

<button class="print" onclick="window.print()">🖨️ طباعة</button>

</div>

<script>
let items = {};
let total = 0;

// رقم فاتورة متصاعد
let invNum = localStorage.getItem("inv") || 1;
document.getElementById("inv").innerText = invNum;

function addItem(name, price) {
  if (!items[name]) {
    items[name] = {price: price, qty: 0};
  }

  if (items[name].qty >= 20) return; // حد أقصى 20

  items[name].qty++;
}

function goInvoice() {
  document.querySelector(".menu").style.display = "none";
  document.querySelector("button").style.display = "none";

  let list = document.getElementById("list");
  list.innerHTML = "";
  total = 0;

  for (let name in items) {
    let item = items[name];
    let sum = item.price * item.qty;
    total += sum;

    let li = document.createElement("li");
    li.innerText = `${name} x${item.qty} = ${sum}`;
    list.appendChild(li);
  }

  document.getElementById("total").innerText = total;

  let now = new Date();
  document.getElementById("date").innerText =
  now.toLocaleDateString() + " - " + now.toLocaleTimeString();

  document.getElementById("invoice").style.display = "block";

  // زيادة رقم الفاتورة
  localStorage.setItem("inv", ++invNum);
}
</script>

</body>
</html>
