<!DOCTYPE html>
<html>
<head>
<title>لعبة بسيطة</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// أرضية
let geometry = new THREE.PlaneGeometry(20,20);
let material = new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide});
let floor = new THREE.Mesh(geometry, material);
floor.rotation.x = Math.PI / 2;
scene.add(floor);

// لاعب (مكعب)
let playerGeo = new THREE.BoxGeometry();
let playerMat = new THREE.MeshBasicMaterial({color: 0xff0000});
let player = new THREE.Mesh(playerGeo, playerMat);
scene.add(player);

camera.position.z = 5;

// تحكم
document.addEventListener("keydown", (e)=>{
    if(e.key === "w") player.position.z -= 0.2;
    if(e.key === "s") player.position.z += 0.2;
    if(e.key === "a") player.position.x -= 0.2;
    if(e.key === "d") player.position.x += 0.2;
});

// تشغيل
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
