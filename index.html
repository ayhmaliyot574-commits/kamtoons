<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مطعم كامتون</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

/* شاشة كلمة المرور */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* المنيو */
#menu { display:none; }

.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.item {
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:15px;
  width:140px;
  box-shadow:0 0 10px #000;
}

.item img {
  width:100%;
  height:90px;
  border-radius:10px;
}

.buy {
  background:orange;
  color:black;
  margin-top:5px;
}

/* زر سري */
.secret {
  position:fixed;
  bottom:10px;
  right:10px;
  opacity:0.1;
}

/* الفاتورة */
#invoice {
  display:none;
  background:white;
  color:black;
  padding:20px;
}
</style>
</head>

<body>

<!-- كلمة مرور -->
<div id="login">
  <h2>🔒 كلمة المرور</h2>
  <input id="pass" type="password">
  <button onclick="check()">OK</button>
</div>

<!-- المنيو -->
<div id="menu">

<h2 style="color:orange">🍕 كامتون</h2>
<p>📞 07905264140</p>

<div class="grid">

<!-- بيتزا -->
<div class="item">
<img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
<p>بيتزا</p>
<p>8000</p>
<button class="buy" onclick="buy('بيتزا',8000)">شراء</button>
</div>

<!-- بركر -->
<div class="item">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<p>بركر</p>
<p>4000</p>
<button class="buy" onclick="buy('بركر',4000)">شراء</button>
</div>

<!-- مندي -->
<div class="item">
<img src="https://images.unsplash.com/photo-1604908812653-3e49c1fda92e">
<p>مندي</p>
<p>8000</p>
<button class="buy" onclick="buy('مندي',8000)">شراء</button>
</div>

<!-- كباب -->
<div class="item">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<p>كباب</p>
<p>6000</p>
<button class="buy" onclick="buy('كباب',6000)">شراء</button>
</div>

<!-- بطاطس -->
<div class="item">
<img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5">
<p>بطاطس</p>
<p>2000</p>
<button class="buy" onclick="buy('بطاطس',2000)">شراء</button>
</div>

<!-- عصير -->
<div class="item">
<img src="https://images.unsplash.com/photo-1553530666-ba11a90f7e40">
<p>عصير</p>
<p>1500</p>
<button class="buy" onclick="buy('عصير',1500)">شراء</button>
</div>

</div>

</div>

<!-- زر سري -->
<button class="secret" onclick="openInvoice()">.</button>

<!-- الفاتورة (بس الك) -->
<div id="invoice">
<h2>🧾 الفاتورة</h2>
<ul id="list"></ul>
<h3 id="total">0</h3>
<button onclick="window.print()">طباعة</button>
</div>

<script>
let total = 0;

/* دخول */
function check(){
  if(document.getElementById("pass").value === "Ff511Ff522Ff533Ff"){
    document.getElementById("login").style.display="none";
    document.getElementById("menu").style.display="block";
  } else {
    alert("خطأ");
  }
}

/* شراء */
function buy(name, price){
  total += price;

  let li = document.createElement("li");
  li.innerText = name + " - " + price;

  document.getElementById("list").appendChild(li);
  document.getElementById("total").innerText = "المجموع: " + total;
}

/* فتح الفاتورة (سري) */
function openInvoice(){
  let code = prompt("ادخل كود الادمن");
  if(code === "admin123"){
    document.getElementById("invoice").style.display="block";
  }
}
</script>

</body>
</html>
