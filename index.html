<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مطعم كامتون</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* شاشة كلمة المرور */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#login input {
  width: 250px;
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

#login button {
  padding: 15px;
  margin-left: 10px;
  border: none;
  border-radius: 10px;
  background: purple;
  color: white;
}

/* الموقع */
#app {
  display: none;
  background: #111;
  min-height: 100vh;
}

.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.item {
  display: flex;
  align-items: center;
  background: purple;
  margin: 5px;
  padding: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.item img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-left: 10px;
}

.invoice {
  display: none;
  background: white;
  color: black;
  width: 300px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
}

.print { background: green; color: white; }

/* طباعة */
@media print {
  body * { display: none; }
  .invoice, .invoice * { display: block; }
}
</style>

</head>
<body>

<!-- 🔐 شاشة الدخول -->
<div id="login">
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="checkPass()">OK</button>
</div>

<!-- 🔥 الموقع -->
<div id="app">

<h2>🍕 المنيو (300 أكلة)</h2>
<div class="menu" id="menu"></div>

<button onclick="goInvoice()">➡️ الفاتورة</button>

<div class="invoice" id="invoice">
<h3>🧾 مطعم كامتون</h3>
<p>📞 07905264140</p>

<p id="date"></p>
<p>رقم الفاتورة: <span id="inv"></span></p>

<ul id="list"></ul>

<h3>المجموع: <span id="total">0</span></h3>

<button class="print" onclick="window.print()">🖨️ طباعة</button>
</div>

</div>

<script>

// 🔐 كلمة المرور (عادية)
function checkPass() {
  let p = document.getElementById("pass").value;

  if (p === "Ff511Ff522Ff533Ff") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("❌ كلمة المرور غلط");
  }
}

// بيانات
let items = {};
let total = 0;

// صورة
let imgSrc = "https://images.unsplash.com/photo-1594007654729-407eedc4be65";

// توليد 300 أكلة
let menuDiv = document.getElementById("menu");

for (let i = 1; i <= 300; i++) {
  let price = 1000 + (i * 20);

  let div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <img src="${imgSrc}">
    <span>أكلة ${i} - ${price}</span>
  `;

  div.onclick = () => addItem("أكلة " + i, price);

  menuDiv.appendChild(div);
}

// رقم فاتورة
let invNum = localStorage.getItem("inv") || 1;
document.getElementById("inv").innerText = invNum;

function addItem(name, price) {
  if (!items[name]) items[name] = {price: price, qty: 0};
  if (items[name].qty >= 20) return;
  items[name].qty++;
}

function goInvoice() {
  document.querySelector(".menu").style.display = "none";

  let list = document.getElementById("list");
  list.innerHTML = "";
  total = 0;

  for (let name in items) {
    let item = items[name];
    let sum = item.price * item.qty;
    total += sum;

    let li = document.createElement("li");
    li.innerText = `${name} x${item.qty} = ${sum}`;
    list.appendChild(li);
  }

  document.getElementById("total").innerText = total;

  let now = new Date();
  document.getElementById("date").innerText =
  now.toLocaleDateString() + " - " + now.toLocaleTimeString();

  document.getElementById("invoice").style.display = "block";

  localStorage.setItem("inv", ++invNum);
}
</script>

</body>
</html>
