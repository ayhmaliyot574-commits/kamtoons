<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مطعم كامتون</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  background: orange;
  padding: 10px;
}

.phone {
  margin: 5px;
  font-size: 18px;
}

.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.category {
  background: #222;
  padding: 10px;
  border-radius: 10px;
}

.category h2 {
  color: orange;
}

button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: purple;
  color: white;
  cursor: pointer;
}

.invoice {
  display: none;
  background: white;
  color: black;
  width: 300px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 10px;
}

.print { background: green; }

@media print {
  body * { display: none; }
  .invoice, .invoice * { display: block; }
}
</style>

</head>
<body>

<h1>🍕 مطعم كامتون</h1>
<div class="phone">📞 07905264140</div>

<div class="menu">

<!-- بيتزا -->
<div class="category">
<h2>بيتزا</h2>
<button onclick="add('بيتزا خضار',18)">بيتزا خضار - 18</button>
<button onclick="add('بيتزا مارجريتا',18)">بيتزا مارجريتا - 18</button>
<button onclick="add('بيتزا مشكل جبن',18)">بيتزا مشكل جبن - 18</button>
<button onclick="add('بيتزا دجاج',21)">بيتزا دجاج - 21</button>
<button onclick="add('بيتزا لحم',21)">بيتزا لحم - 21</button>
<button onclick="add('بيتزا بيبروني',21)">بيتزا بيبروني - 21</button>
</div>

<!-- مناقيش -->
<div class="category">
<h2>مناقيش</h2>
<button onclick="add('جبنة عكاوي',11)">جبنة عكاوي - 11</button>
<button onclick="add('جبنة سائل',9)">جبنة سائل - 9</button>
<button onclick="add('جبنة موزاريلا',11)">جبنة موزاريلا - 11</button>
<button onclick="add('زعتر',10)">زعتر - 10</button>
<button onclick="add('لبنة',10)">لبنة - 10</button>
</div>

<!-- بطاطس -->
<div class="category">
<h2>بطاطس</h2>
<button onclick="add('بطاطس',7)">بطاطس - 7</button>
<button onclick="add('بطاطس بالجبن',8)">بطاطس بالجبن - 8</button>
</div>

<!-- حلويات -->
<div class="category">
<h2>الحلا</h2>
<button onclick="add('نوتيلا',10)">نوتيلا - 10</button>
<button onclick="add('نوتيلا موز',12)">نوتيلا موز - 12</button>
</div>

</div>

<button onclick="showInvoice()">📄 عرض الفاتورة</button>

<div class="invoice" id="invoice">
<h3>🧾 مطعم كامتون</h3>
<p>📞 07905264140</p>

<p id="date"></p>
<p>رقم الفاتورة: <span id="num"></span></p>

<ul id="list"></ul>

<h3>المجموع: <span id="total">0</span></h3>

<button class="print" onclick="window.print()">🖨️ طباعة</button>
</div>

<script>
let items = [];
let total = 0;

// رقم فاتورة
let num = localStorage.getItem("inv") || 1;
document.getElementById("num").innerText = num;

function add(name, price) {
  items.push({name, price});
}

function showInvoice() {
  let list = document.getElementById("list");
  list.innerHTML = "";
  total = 0;

  items.forEach(i => {
    total += i.price;
    let li = document.createElement("li");
    li.innerText = i.name + " - " + i.price;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;

  let now = new Date();
  document.getElementById("date").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  document.getElementById("invoice").style.display = "block";

  localStorage.setItem("inv", ++num);
}
</script>

</body>
</html>
